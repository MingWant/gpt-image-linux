services:
  gpt-image-panel:
    build:
      context: .
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:24-alpine}
        PANEL_PATH: ${PANEL_PATH:-}
    container_name: gpt-image-panel
    ports:
      - "0.0.0.0:17600:9090"
    volumes:
      - ./images:/app/images
      - ./data:/app/data
    environment:
      - DEFAULT_API_URL=${DEFAULT_API_URL:-}
      - DEFAULT_API_KEY=${DEFAULT_API_KEY:-}
      - DEFAULT_API_PATH=${DEFAULT_API_PATH:-/v1/images/generations}
      - DEFAULT_RESPONSES_MODEL=${DEFAULT_RESPONSES_MODEL:-gpt-5.4}
      - PANEL_PATH=${PANEL_PATH:-}
      - ACCESS_KEY=${ACCESS_KEY:-}
      - ALLOW_UNAUTHENTICATED=${ALLOW_UNAUTHENTICATED:-false}
      - ACCESS_COOKIE_SECURE=${ACCESS_COOKIE_SECURE:-auto}
      - ACCESS_MAX_FAILURES=${ACCESS_MAX_FAILURES:-5}
      - ACCESS_LOCKOUT_SECONDS=${ACCESS_LOCKOUT_SECONDS:-300}
      - IP_ALLOWLIST=${IP_ALLOWLIST:-}
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - UPSTREAM_HOST_ALLOWLIST=${UPSTREAM_HOST_ALLOWLIST:-}
      - UPSTREAM_USER_AGENT=${UPSTREAM_USER_AGENT:-}
      - UPSTREAM_ORIGIN=${UPSTREAM_ORIGIN:-}
      - UPSTREAM_REFERER=${UPSTREAM_REFERER:-}
      - UPSTREAM_EXTRA_HEADERS=${UPSTREAM_EXTRA_HEADERS:-}
      - WEBHOOK_HOST_ALLOWLIST=${WEBHOOK_HOST_ALLOWLIST:-}
      - WEBHOOK_SIGNING_SECRET=${WEBHOOK_SIGNING_SECRET:-}
      - WEBHOOK_TIMEOUT_SECONDS=${WEBHOOK_TIMEOUT_SECONDS:-5}
      - WEBHOOK_MAX_ATTEMPTS=${WEBHOOK_MAX_ATTEMPTS:-3}
      - MAX_FILE_SIZE_MB=50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
